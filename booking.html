  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const checkboxes = Array.from(document.querySelectorAll('[data-booking-consent]'));
      const widget = document.querySelector('[data-booking-widget]');

      if (!checkboxes.length || !widget) return;

      let wasReady = checkboxes.every(function (checkbox) {
        return checkbox.checked;
      });

      function syncBookingAccess() {
        const isReady = checkboxes.every(function (checkbox) {
          return checkbox.checked;
        });

        widget.classList.toggle('is-ready', isReady);

        if (isReady && !wasReady) {
          window.setTimeout(function () {
            widget.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 160);
        }

        wasReady = isReady;
      }

      checkboxes.forEach(function (checkbox) {
        checkbox.addEventListener('change', syncBookingAccess);
      });

      syncBookingAccess();
    });
  </script>
