  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sage: #6b8f71;
      --sage-lt: #a8c5ab;
      --sage-dk: #4a6950;
      --cream: #f7f4ef;
      --warm: #ede8df;
      --charcoal: #2c2c2c;
      --mid: #5a5a5a;
      --light: #8a8a8a;
      --white: #ffffff;
      --border: rgba(0, 0, 0, .08);
      --shadow: rgba(0, 0, 0, .08);
      --shadow-lg: rgba(0, 0, 0, .12);
      --radius: 18px;
      --transition: .3s ease;
      --danger: #9f4e4e;
      --danger-bg: #f8e9e9;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(168, 197, 171, .35), transparent 30%),
        linear-gradient(180deg, #f4f1ea 0%, #ffffff 30%, #f8f5ef 100%);
      color: var(--charcoal);
      line-height: 1.7;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 5%;
      background: rgba(247, 244, 239, .92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      color: var(--sage-dk);
      text-decoration: none;
      font-weight: 800;
      letter-spacing: .4px;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .back-link {
      text-decoration: none;
      color: var(--mid);
      font-size: .92rem;
      font-weight: 600;
    }
    .lang-switcher { display: flex; gap: 6px; }
    .lang-btn {
      border: 1.5px solid var(--sage-lt);
      background: transparent;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: .8rem;
      cursor: pointer;
      color: var(--mid);
      transition: all var(--transition);
      text-decoration: none;
      display: inline-block;
    }
    .lang-btn.active,
    .lang-btn:hover {
      background: var(--sage);
      color: var(--white);
      border-color: var(--sage);
    }
    .whatsapp-help {
      position: fixed;
      inset-inline-end: 18px;
      bottom: 18px;
      z-index: 90;
      width: 58px;
      height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, .96);
      border: 1px solid rgba(37, 211, 102, .24);
      text-decoration: none;
      box-shadow: 0 16px 32px rgba(41, 61, 45, .18);
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
    }
    .whatsapp-help:hover {
      background: #f4fbf7;
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 20px 38px rgba(37, 211, 102, .34);
    }
    .whatsapp-help img {
      width: 28px;
      height: 28px;
      display: block;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 5% 72px;
    }
    .hero {
      padding: 64px 0 34px;
    }
    .hero-tag {
      display: inline-block;
      margin-bottom: 16px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(107, 143, 113, .12);
      color: var(--sage-dk);
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
    }
    .hero h1 {
      font-size: clamp(2.1rem, 4vw, 3.3rem);
      line-height: 1.1;
      margin-bottom: 16px;
      color: var(--sage-dk);
      max-width: 760px;
    }
    .hero p {
      max-width: 800px;
      color: var(--mid);
      font-size: 1.05rem;
    }

    .surface {
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(107, 143, 113, .12);
      border-radius: 24px;
      box-shadow: 0 12px 32px var(--shadow);
      padding: 30px;
    }

    .btn-primary,
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 700;
      transition: all var(--transition);
      border: none;
      cursor: pointer;
      font: inherit;
    }
    .btn-primary {
      background: var(--sage-dk);
      color: var(--white);
      padding: 14px 24px;
    }
    .btn-primary:hover {
      background: var(--sage);
      transform: translateY(-1px);
    }

    @media (max-width: 768px) {
      nav {
        align-items: flex-start;
        flex-direction: column;
      }
      .nav-actions {
        width: 100%;
        justify-content: space-between;
      }
      .surface {
        padding: 24px;
      }
      .whatsapp-help {
        inset-inline-end: 12px;
        bottom: 12px;
        width: 52px;
        height: 52px;
      }
      .whatsapp-help img {
        width: 25px;
        height: 25px;
      }
    }
  </style>
</head>

        <a class="lang-btn" href="/en/booking.html">EN</a>

  <main class="page">

</html>
